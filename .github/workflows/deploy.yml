name: Deploy to GitHub Pages

on:
  # mainブランチにpushされた時に自動で実行します
  push:
    branches: ['main']
  # GitHub Actionsタブから手動で実行することも可能にします
  workflow_dispatch:

# GITHUB_TOKEN の権限を設定して、Pages へのデプロイを許可します
permissions:
  contents: read
  pages: write
  id-token: write

# 複数同時にデプロイが走った場合に古いものをキャンセルします
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 依存関係のインストール
        run: npm ci

      - name: ビルドの実行 (distフォルダの作成)
        run: npm run build

      - name: GitHub Pagesの設定
        uses: actions/configure-pages@v4

      - name: アップロード (distフォルダを対象に)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: GitHub Pagesへのデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
